<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xero Invoice</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Create Invoice</h1>
      <div id="auth-status">
        <button id="connect-btn" class="btn btn-connect">Connect to Xero</button>
        <span id="connected-msg" class="hidden">Connected to Xero <button id="logout-btn" class="btn btn-logout">Logout</button></span>
      </div>
    </header>

    <form id="invoice-form">
      <section class="form-section">
        <h2>Contact</h2>
        <div class="form-row">
          <label for="contact-name">Name</label>
          <input type="text" id="contact-name" required placeholder="Customer name">
        </div>
        <div class="form-row">
          <label for="contact-email">Email</label>
          <input type="email" id="contact-email" placeholder="customer@example.com">
        </div>
      </section>

      <section class="form-section">
        <h2>Details</h2>
        <div class="form-row form-row-half">
          <div>
            <label for="invoice-date">Invoice Date</label>
            <input type="date" id="invoice-date" required>
          </div>
          <div>
            <label for="due-date">Due Date</label>
            <input type="date" id="due-date" required>
          </div>
        </div>
        <div class="form-row form-row-half">
          <div>
            <label for="reference">Reference</label>
            <input type="text" id="reference" placeholder="INV-001">
          </div>
          <div>
            <label for="currency">Currency</label>
            <select id="currency"><option value="">Loading...</option></select>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h2>Line Items</h2>
        <table id="line-items">
          <thead>
            <tr>
              <th>Description</th>
              <th>Qty</th>
              <th>Unit Price</th>
              <th>Amount</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
          </tbody>
        </table>
        <button type="button" id="add-line" class="btn btn-secondary">+ Add Line</button>
      </section>

      <section class="totals">
        <div class="total-row">
          <span>Subtotal</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="total-row total-final">
          <span>Total</span>
          <span id="total">$0.00</span>
        </div>
      </section>

      <button type="button" id="random-btn" class="btn btn-secondary" style="width:100%;margin-bottom:0.5rem;">Fill Random Test Data</button>
      <button type="submit" id="submit-btn" class="btn btn-primary" disabled>Submit to Xero</button>
      <div id="status-msg" class="hidden"></div>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
